<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tabla con colores</title>
    <style>
        /* Estilos generales de la tabla */
        table {
            width: 100%;
            max-width: 600px;
            border-collapse: collapse; /* Une los bordes de las celdas */
            margin: 20px auto;
            font-family: sans-serif;
        }

        /* Color de fondo y texto para el encabezado */
        th {
            background-color: #2c3e50; /* Azul oscuro */
            color: #ffffff; /* Texto blanco */
            padding: 12px;
            text-align: left;
        }

        /* Padding para las celdas de datos */
        td {
            padding: 12px;
            border-bottom: 1px solid #dddddd;
        }

        /* Efecto de color intercalado en filas (Alternar colores) */
        tr:nth-child(even) {
            background-color: #f2f2f2; /* Gris muy claro */
        }

        tr:nth-child(odd) {
            background-color: #ffffff; /* Fondo blanco */
        }

        /* Resaltar fila al pasar el mouse */
        tr:hover {
            background-color: #d5dbdb;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <th>Nombre</th>
            <th>Cargo</th>
            <th>Ciudad</th>
        </tr>
        <tr>
            <td>Ana Pérez</td>
            <td>Gerente</td>
            <td>Santiago</td>
        </tr>
        <tr>
            <td>Juan Gómez</td>
            <td>Desarrollador</td>
            <td>Valparaíso</td>
        </tr>
        <tr>
            <td>María Silva</td>
            <td>Diseñadora</td>
            <td>Concepción</td>
        </tr>
    </table>

</body>
</html>
