<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="annerillanabalon@liceovvh.cl">
    <title>Pokédex</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <header>
        <div class="hea-cont">
            <img src="{{ url_for('static', filename='images/pokebola.png') }}" alt="Logo" width="50">
            <h1>Pokédex</h1>
        </div>
    </header>
    <nav>
        <div class="nav-container">
            <p><strong>{{ titulo }}</strong></p>
            <div class="nav-btn">
                <a href="{{ url_for('pokemon') }}" class="navb btn-blue"><i class="bi bi-list-ul"></i> Ver todos</a>
                <a href="{{ url_for('limit', cantidad=5) }}" class="navb btn-green"><i class="bi bi-funnel-fill"></i>
                    Ver 5 primeros</a>
            </div>
        </div>
    </nav>
    <main>
        <div class="container">
            {% for p in poke %}
            <div class="tarj">
                <div class="tar-head">
                    <p class="ids">#{{ p.id }}</p>
                    <img class="tarj-img" src="{{ url_for('static', filename='images/' + p.imagen) }}"
                        alt="{{ p.nombre }}" width="100">
                </div>
                <div class="tar-body">
                    <h3>{{ p.nombre }}</h3>
                    <div class="tipo">
                        {% for t in p.tipo.split('/') %}
                        <span class="ti-p {{ colores[t.lower()] }}">{{ t }}</span>
                        {% endfor %}
                    </div>
                    <div class="barra">
                        <p class="grey"><i class="bi bi-lightning-fill"></i> Poder</p>
                        <div class="poder">
                            <div class="fill" style="width:{{ p.poder }}px">{{ p.poder }}</div>
                        </div>
                    </div>
                    <div class="datos">
                        <div class="caj">
                            <p class="grey"><i class="fa-solid fa-ruler-vertical"></i> Altura</p>
                            <p><strong>{{ p.altura }}</strong></p>
                        </div>
                        <div class="caj">
                            <p class="grey"><i class="fa-solid fa-weight-hanging"></i> Peso</p>
                            <p><strong>{{ p.peso }}</strong></p>
                        </div>
                    </div>
                </div>
                <div class="det">
                    <a href="{{ url_for('buscar', id=p.id) }}" class="detalles">Ver Detalles</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>

</html>
