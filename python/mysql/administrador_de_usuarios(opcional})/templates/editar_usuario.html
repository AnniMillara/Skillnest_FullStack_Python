<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- css -->
    <link rel="stylesheet" href="../static/css/styles.css">
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cause:wght@100..900&display=swap" rel="stylesheet">
    <title>EditarUsuario</title>
</head>

<body>
    <div class="container">
        <div class="row">
            <h2 class="titulo">Nuevo Usuario</h2>
            <div class="regs">
                <label for="nombre">Nombre</label>
                <input class="largo" type="name" name="nombre" placeholder="">
            </div>
            <div class="regs">
                <label for="correo">E-mail</label>
                <input class="largo" type="email" name="correo" placeholder="">
            </div>
            <div class="regs">
                <label for="contra">Contarseña</label>
                <input class="largo" type="password" name="contra" placeholder="">
            </div>
            <div class="regs">
                <label for="contra">Conf. Contarseña</label>
                <input class="largo" type="password" name="contra" placeholder="">
            </div>
            <div class="regs">
                <label for="contra">Tipo de Usuario</label>
                <select class="sel" name="tipos" id="users">
                    <option value="opcion1">Usuario</option>
                    <option value="opcion2">Admin</option>
                </select>
            </div>
            <button class="enviar">Aceptar</button>
        </div>
    </div>
</body>

</html>
