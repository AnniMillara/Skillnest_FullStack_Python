<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- css -->
    <link rel="stylesheet" href="static/css/styles.css">
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cause:wght@100..900&display=swap" rel="stylesheet">
    <title>IniciarSesion</title>
</head>

<body>
    <div class="container">
        <!-- columna uno -->
        <div class="row">
            <h2 class="titulo">Inicio de Sesión</h2>
            <div class="regs">
                <label for="correo">E-mail</label>
                <input type="email" name="correo" placeholder="">
            </div>
            <div class="regs">
                <label for="contra">Contarseña</label>
                <input type="password" name="contra" placeholder="">
            </div>
            <button class="enviar">Iniciar Sesión</button>
        </div>

        <!-- columna dos -->
        <div class="row">
            <h2 class="titulo">Registro</h2>
            <div class="regs">
                <label for="nombre">Nombre</label>
                <input type="name" name="nombre" placeholder="">
            </div>
            <div class="regs">
                <label for="correo">E-mail</label>
                <input type="email" name="correo" placeholder="">
            </div>
            <div class="regs">
                <label for="contra">Contarseña</label>
                <input type="password" name="contra" placeholder="">
            </div>
            <div class="regs">
                <label for="contra">Conf. Contarseña</label>
                <input type="password" name="contra" placeholder="">
            </div>
            <button class="enviar">Registrar</button>
        </div>
    </div>
</body>

</html>
